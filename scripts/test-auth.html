<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google認証テスト</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            background-color: #4285f4;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #357ae8;
        }
        .status {
            margin: 20px 0;
            padding: 10px;
            border-radius: 4px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        pre {
            background-color: #f4f4f4;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>Firebase Google認証テスト</h1>
    
    <div id="status" class="status info">
        準備中...
    </div>
    
    <button id="loginBtn" disabled>Googleでログイン</button>
    <button id="logoutBtn" style="display:none;">ログアウト</button>
    
    <div id="userInfo" style="margin-top: 20px; display: none;">
        <h3>ユーザー情報</h3>
        <pre id="userData"></pre>
    </div>
    
    <div style="margin-top: 30px;">
        <h3>デバッグ情報</h3>
        <pre id="debug"></pre>
    </div>

    <script type="module">
        // Firebase設定
        const firebaseConfig = {
            apiKey: "AIzaSyDu9e0X1x9Zu4JGrFLRgG2KRWEeJK8gOa8",
            authDomain: "crypto-talon-417715.firebaseapp.com",
            projectId: "crypto-talon-417715",
            storageBucket: "crypto-talon-417715.appspot.com",
            messagingSenderId: "629344699531",
            appId: "1:629344699531:web:e1d31bb45c86b4cf07e93f"
        };

        // デバッグ情報を表示
        const debugEl = document.getElementById('debug');
        const statusEl = document.getElementById('status');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const userInfoEl = document.getElementById('userInfo');
        const userDataEl = document.getElementById('userData');

        debugEl.textContent = `現在のURL: ${window.location.href}\nドメイン: ${window.location.hostname}\nプロトコル: ${window.location.protocol}`;

        // Firebase SDKを動的にロード
        import('https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js').then(async (module) => {
            const { initializeApp } = module;
            
            const authModule = await import('https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js');
            const { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } = authModule;
            
            // Firebaseを初期化
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const provider = new GoogleAuthProvider();
            
            statusEl.textContent = 'Firebaseが正常に初期化されました';
            statusEl.className = 'status success';
            loginBtn.disabled = false;
            
            // 認証状態の監視
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    statusEl.textContent = `ログイン済み: ${user.displayName || user.email}`;
                    statusEl.className = 'status success';
                    loginBtn.style.display = 'none';
                    logoutBtn.style.display = 'inline-block';
                    userInfoEl.style.display = 'block';
                    userDataEl.textContent = JSON.stringify({
                        uid: user.uid,
                        email: user.email,
                        displayName: user.displayName,
                        photoURL: user.photoURL
                    }, null, 2);
                } else {
                    statusEl.textContent = 'ログインしていません';
                    statusEl.className = 'status info';
                    loginBtn.style.display = 'inline-block';
                    logoutBtn.style.display = 'none';
                    userInfoEl.style.display = 'none';
                }
            });
            
            // ログインボタンのクリックイベント
            loginBtn.addEventListener('click', async () => {
                try {
                    statusEl.textContent = 'ログイン中...';
                    statusEl.className = 'status info';
                    
                    const result = await signInWithPopup(auth, provider);
                    const user = result.user;
                    
                    statusEl.textContent = `ログインに成功しました: ${user.displayName}`;
                    statusEl.className = 'status success';
                    
                } catch (error) {
                    console.error('ログインエラー:', error);
                    statusEl.textContent = `エラー: ${error.code} - ${error.message}`;
                    statusEl.className = 'status error';
                    
                    // エラーの詳細情報を表示
                    debugEl.textContent += `\n\nエラー詳細:\nコード: ${error.code}\nメッセージ: ${error.message}`;
                    
                    if (error.code === 'auth/unauthorized-domain') {
                        debugEl.textContent += '\n\n対処法:\n1. Firebase Console → Authentication → Settings → Authorized domains\n2. 現在のドメインを追加: ' + window.location.hostname;
                    }
                }
            });
            
            // ログアウトボタンのクリックイベント
            logoutBtn.addEventListener('click', async () => {
                try {
                    await signOut(auth);
                    statusEl.textContent = 'ログアウトしました';
                    statusEl.className = 'status info';
                } catch (error) {
                    console.error('ログアウトエラー:', error);
                    statusEl.textContent = `ログアウトエラー: ${error.message}`;
                    statusEl.className = 'status error';
                }
            });
            
        }).catch((error) => {
            statusEl.textContent = `Firebase SDKの読み込みに失敗しました: ${error.message}`;
            statusEl.className = 'status error';
            debugEl.textContent += `\n\nSDKロードエラー: ${error.message}`;
        });
    </script>
</body>
</html>
