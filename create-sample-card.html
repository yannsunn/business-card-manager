<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>サンプル名刺画像生成</title>
</head>
<body>
    <canvas id="canvas" width="1050" height="600"></canvas>
    <br>
    <button onclick="downloadImage()">画像をダウンロード</button>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // 背景
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, 1050, 600);
        
        // 枠線
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 2;
        ctx.strokeRect(10, 10, 1030, 580);
        
        // 会社名
        ctx.fillStyle = '#000';
        ctx.font = 'bold 48px Arial';
        ctx.fillText('株式会社テストカンパニー', 50, 80);
        
        // 部署
        ctx.font = '28px Arial';
        ctx.fillText('技術開発部', 50, 130);
        
        // 役職
        ctx.font = 'bold 32px Arial';
        ctx.fillText('部長', 50, 200);
        
        // 名前
        ctx.font = 'bold 56px Arial';
        ctx.fillText('山田 太郎', 50, 280);
        ctx.font = '24px Arial';
        ctx.fillText('Taro Yamada', 50, 320);
        
        // 連絡先
        ctx.font = '24px Arial';
        ctx.fillText('〒100-0001 東京都千代田区千代田1-1-1', 50, 400);
        ctx.fillText('TEL: 03-1234-5678', 50, 440);
        ctx.fillText('Mobile: 090-1234-5678', 350, 440);
        ctx.fillText('Email: yamada@test-company.co.jp', 50, 480);
        ctx.fillText('URL: https://www.test-company.co.jp', 50, 520);
        
        // QRコード風の四角
        ctx.fillStyle = '#000';
        for(let i = 0; i < 10; i++) {
            for(let j = 0; j < 10; j++) {
                if(Math.random() > 0.5) {
                    ctx.fillRect(850 + i*15, 400 + j*15, 13, 13);
                }
            }
        }
        
        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'sample-business-card.png';
            link.href = canvas.toDataURL();
            link.click();
        }
        
        // 自動でダウンロード
        setTimeout(downloadImage, 1000);
    </script>
</body>
</html>
